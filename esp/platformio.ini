[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; PSRAM 核心配置（ESP32-S3 专用）
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi

; Flash 配置
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv

; ============ 关键：启用 PSRAM 栈支持 ============
build_flags =
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_USE=1
    -DCONFIG_SPIRAM_ALLOW_STACK_EXTERNAL_MEMORY=1
    -DCONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL=0
    -DCONFIG_SPIRAM_MALLOC_RESERVE_INTERNAL=32768
    -DARDUINO_LOOP_STACK_SIZE=32768    ; 增大 loop 任务栈到 32KB（默认 8KB）

; 链接器标志：强制栈在 PSRAM
board_build.ldflags =
    -Wl,--wrap=esp_stack_ptr_init

monitor_speed = 115200